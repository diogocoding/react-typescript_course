<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">

    <title>Rocketseat - react.js - fundamentos</title>
    <style type="text/tailwindcss">
        @theme {
            --text: #EBEBEB;  
            --text-secondary: #6B6B6B;  
            --primary: #462878;
            --background: #2d2a37;

            --gradient: 180deg, 
                rgba(0, 0, 0, 0.05) 0%, 
                rgba(255, 255, 255, 0.05) 100%;

            --gradient-hover: 180deg, 
                rgba(0, 0, 0, 0.1) 0%, 
                rgba(255, 255, 255, 0.1) 100%;

            --shadow: 0 11px 7px 0 rgba(0, 0, 0, 0.01), 
                0 7px 7px 0 rgba(0, 0, 0, 0.04), 
                0 4px 6px 0 rgba(0, 0, 0, 0.10), 
                0 2px 4px 0 rgba(0, 0, 0, 0.26), 
                0 0 2px 0 rgba(0, 0, 0, 0.29), 
                0 2px 3px 0 rgba(255, 255, 255, 0.06) inset;

            --font-sans: 'Rubik', sans-serif;
        }

    </style>
</head>
<body class='min-h-screen bg-linear-[180deg,_#807ECE_0%,_#8E7ECE_100%] text-(--text) font-(--font-sans)'>
    <div id= "root" > </div> <!-- essa div será responsável por renderizar a aplicação no react -->



<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://unpkg.com/@tailwindcss/browser@4"></script>



<script type="text/babel">  

    const textVariants = {
        default:'text-xl',
        muted: 'text-xl text-(--text-secondary)', //o textinho cinza que tem o mesmo tamanho do default
        heading: 'text-2xl',
        blast: 'text-3xl'


    }

    function Text({
        as ='span',
        variant ='default',
        className, 
        children, 
        ...props}) {  //ex clássico de um componete polimórfico, se transforma em qualquer tag, dependendo do que vc passar para ele
        return React.createElement(
        as,
        {
            className:`${textVariants[variant]} ${className ? className : ''}`,
            ...props,
        },
        children

        )


    }

    const buttonVariants = {

        default: 'bg-(--background)',
        primary: 'bg-(--primary)'

    }


    function Button({
        variant = 'default',
        className, 
        children,
        ...props
       }) {
        return (
        <Text 
        as='button'
        variant='heading'
        className={`
            flex items-center justify-center rounded-xl
            p-3 cursor-pointer text-(--text)
            bg-linear-(--gradient)
            hover:bg-linear-(--gradient-hover)
            shadow-(--shadow)
            ${buttonVariants[variant]}
            ${className ? className : ''}
            `} 
            {...props}
        >
        {children}

        </Text>
    )
    }
    
    function Card({children, className, ...props}){
        return (
            <div className ={`
                bg-(--background) shadow-(--shadow)
                rounded-2xl
                ${className ? className : ""}
                `}>
                {children}
            </div>
        )
    }
    

    const buttons = [
  [
    { input: "CE" },
    { input: "C", className: "flex-1 h-16" },
    { input: "/", variant: "primary" }
  ],
  [
    { input: "7" },
    { input: "8" },
    { input: "9" },
    { input: "X", variant: "primary" }
  ],
  [
    { input: "4" },
    { input: "5" },
    { input: "6" },
    { input: "-", variant: "primary" }
  ],
  [
    { input: "1" },
    { input: "2" },
    { input: "3" },
    { input: "+", variant: "primary" }
  ],
  [
    { input: "0", className: "flex-1 h-16" },
    { input: "," },
    { input: "=", variant: "primary" }
  ]
];
      const CalculatorContext = React.createContext();

  function CalculatorProvider({ children }) {
    const [history, setHistory] = React.useState([]);

    // 1. Nomenclatura: Magic String (Chave de Identificação)
    // Classificação: Constante de Configuração para o LocalStorage
    const historyStorageKey = 'calculator-history';

    // 2. Nomenclatura: useEffect Hook (Efeito de Montagem)
    // Classificação: Recuperação de Dados (Data Retrieval)
    // Esse bloco roda APENAS UMA VEZ quando o app abre.
    React.useEffect(() => {
      const savedHistory = localStorage.getItem(historyStorageKey);
      
      if (savedHistory) {
        // Transformamos o texto do "armário" de volta em lista (Array)
        setHistory(JSON.parse(savedHistory));
      }
    }, []);

    function updateHistory(operation, parsedResult) {
      setHistory((prev) => {
        // Criamos a nova lista com o resultado atual
        const newEntry = `${operation} = ${parsedResult}`;
        const updatedHistory = [...prev, newEntry];

        // 3. Nomenclatura: localStorage.setItem (Persistência)
        // Classificação: Escrita de Dados (Data Storage)
        // Transformamos a lista em TEXTO para caber no LocalStorage
        localStorage.setItem(
          historyStorageKey, 
          JSON.stringify(updatedHistory)
        );

        return updatedHistory;
      });
    }

    return (
      <CalculatorContext.Provider value={{ history, updateHistory }}>
        {children}
      </CalculatorContext.Provider>
    );
  }

function useCalculator() {
  const [operation, setOperation] = React.useState("");
  const [result, setResult] = React.useState("");
  const { updateHistory } = React.useContext(CalculatorContext);


  function doOperation(input){
     // 1. Limpar tudo (C)
    if (input === "C") {
        setOperation('');
        setResult('');
        return;
    }

    // 2. Apagar o último (CE) - agora usando -1 porque não teremos espaços inúteis
    if (input === "CE") {
        setOperation(operation.slice(0, -1));
        return;
    }

    // 3. Resolver o cálculo (=)
    if (input === "=") {
    const formula = operation.replaceAll('X', '*').replaceAll(',', '.');
    const operationResult = eval(formula); 
    
    setResult(operationResult.toString());
    updateHistory(operation, operationResult); 

    return;
}

    // 4. Se clicar em operador após um resultado, continua a conta
    const isOperator = ['+', '-', 'X', '/'].includes(input);
    if (result && isOperator) {
        setOperation(result + ' ' + input + ' ');
        setResult('');
        return;
    }

    // 5. TRATAMENTO DA VÍRGULA (O segredo!)
    if (input === ",") {
        // Só adiciona se não terminar com vírgula E se não estiver vazia
        if (!operation.endsWith(',') && operation !== "") {
            setOperation(`${operation},`);
        }
        return; 
    }

    // 6. TRATAMENTO DE NÚMEROS E OPERADORES
    if (isOperator) {
        // Adiciona espaço antes e depois do operador para o eval não quebrar
        setOperation(`${operation} ${input} `);
    } else {
        // NÚMERO: Adiciona GRUDADO, sem aquele espaço que estava causando o erro
        setOperation(`${operation}${input}`);
    }
  }

  return {
    operation,
    result,
    doOperation,
  }

}

    function CalculatorDisplay({
        operation, result
    }){
        return(
            <div className={`
            flex flex-col gap-2 px-[1.375rem]
            cursor-default select-none
                `}>


                <Text 
                as='div' 
                variant='muted'
                className='flex items-center justify-end h-7'    >
                    {result && operation}
                    </Text>
                    <div className={`
                flex items-center justify-between h-9
                `}>
                <Text variant='muted'>=</Text>
                <Text variant='blast'>{result || operation}</Text>
                        </div>
            </div>
        )
    }
    
    function Calculator(){
      const { operation, result, doOperation } = useCalculator();
        
      function handleInputClick(input) {
        doOperation(input);
      }


        return(
        <Card className='
        flex flex-col gap-[1.625rem] w-[22.25rem]
        pt-14 px-8 pb-8
        '>
       
    <CalculatorDisplay operation={operation} result={result} />

<div className="flex flex-col gap-3">
  {buttons.map((row, index) => (
    <div key={`row-${index}`} className="flex gap-3">
      {row.map(button => (
        <Button 
          key={button.input} 
          className={button.className || "w-16 h-16"}
          variant={button.variant || "default"}
          onClick={() => handleInputClick(button.input)}
        >
          {button.input}
        </Button>
      ))}
    </div>
  ))}
</div>
        </Card>

        )
    }
   

function OperationHistory() {
  
  // 2. Nomenclatura: useContext Hook
  // Classificação: Receptor de Dados Globais (Subscriber)
  // { history }: Desestruturação de Objeto (Object Destructuring)
  const { history } = React.useContext(CalculatorContext);

  return (
    // 3. Nomenclatura: Card (Componente de Layout)
    <Card className="w-full py-10 px-8">
      
      {/* 4. Nomenclatura: Text (Componente Polimórfico) */}
      <Text as="h1" variant="heading" className="mb-4">
        Histórico de Operações
      </Text>

      {/* 5. Nomenclatura: Unordered List (Lista Não Ordenada) */}
      <ul className="flex flex-col gap-3">
        
        {/* 6. Nomenclatura: Método .map() (Iterador de Array) 
               Classificação: Renderização de Lista Dinâmica */}
        {history.map((value, index) => (
          
          /* 7. Nomenclatura: 'key' (Prop Especial do React)
                 Classificação: Identificador Único de Reconciliação
                 Uso de Template String para gerar 'item-0', 'item-1', etc. */
          <Text key={`item-${index}`} as="li">
            {value}
          </Text>
          
        ))}
      </ul>
    </Card>
        )
    }
   





    function App(){
        return (
        <main className={` 
            
            py-28 px-4 sm:px-10
            flex flex-col sm:flex-row
            items-center sm:items-stretch
            gap-2
            `}>
            < CalculatorProvider  >

                <Calculator />
                <OperationHistory className='mt-10' />

            </CalculatorProvider>
            
            
        </main>

        )

    }

    

    

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)

  
</script>

</body>
</html>
